services:
  - type: web
    name: multi-source-research-agent-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: ENABLE_DOCS
        value: false

  - type: web
    name: multi-source-research-agent-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
